# Example: serve Vite production build on port 8080 and proxy API/WebSocket to rtt-alhuda (3000).
# Same origin → MobileView QR uses the Pi hostname/IP in the browser; /api/lan-ipv4 and /stream work.
#
#   sudo cp scripts/nginx-khutba-frontend.example.conf /etc/nginx/sites-available/khutba.conf
#   sudo ln -sf /etc/nginx/sites-available/khutba.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust root to your Khutba-app-frontend dist path and listen port.

server {
    listen 8080 default_server;
    listen [::]:8080 default_server;

    server_name _;

    # Built output from: (cd rtt-alhuda/Khutba-app-frontend && npm run build)
    # or legacy: .../khutba-app/Khutba-app-frontend/dist
    root /home/pi/khutba-app/rtt-alhuda/Khutba-app-frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # SSE (must not be fully buffered)
    location /stream/text {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 1d;
    }

    location /stream {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/lan-ipv4 {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }
}
