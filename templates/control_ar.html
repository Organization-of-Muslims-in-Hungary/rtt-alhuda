<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>تحكم جمعة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #080d18;
        --surface: #0f1623;
        --border: #1a2540;
        --gold: #d4a843;
        --text: #f0f4ff;
        --muted: #5a6b8a;
        --green: #22c55e;
        --red: #ef4444;
        --blue: #3b82f6;
        --orange: #f97316;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        min-height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Amiri", "Segoe UI", sans-serif;
        direction: rtl;
        padding: 24px 16px 40px;
      }

      .page-header {
        display: flex; flex-direction: column; align-items: center; gap: 2px;
        margin-bottom: 20px;
      }

      .cards-grid {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        max-width: 1200px;
        margin: 0 auto;
      }

      @media (min-width: 800px) {
        .cards-grid {
          display: grid;
          grid-template-columns: repeat(2, 1fr);
          align-items: stretch;
        }
      }
      @media (min-width: 1200px) {
        .cards-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      .card.hidden { display: none; }

      /* Language toggle top-right */
      .lang-toggle {
        position: fixed; top: 14px; left: 14px;
        background: var(--surface); border: 1px solid var(--border);
        border-radius: 8px; padding: 6px 14px;
        font-size: 12px; color: var(--muted);
        text-decoration: none; transition: color .2s;
        font-family: "Segoe UI", sans-serif;
      }
      .lang-toggle:hover { color: var(--gold); }

      .card {
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 16px;
      }
      @media (max-width: 799px) {
        .card { max-width: 380px; }
      }
      .card-title {
        font-size: 13px; font-weight: 700; color: var(--muted);
        margin-bottom: 12px; direction: rtl;
      }

      .status-row { display: flex; align-items: center; gap: 12px; flex-direction: row-reverse; justify-content: flex-end; }
      .big-dot {
        width: 16px; height: 16px; border-radius: 50%;
        background: var(--muted); flex-shrink: 0; transition: background .3s;
      }
      .big-dot.recording {
        background: var(--green);
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { transform: scale(.85); opacity: .6; }
        50%  { transform: scale(1.15); opacity: 1; }
      }
      .status-label { font-size: 18px; font-weight: 700; }
      .status-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

      .btn-row { display: flex; gap: 10px; direction: rtl; }
      .btn {
        flex: 1; padding: 16px 8px;
        border-radius: 12px; border: 2px solid;
        font-size: 16px; font-weight: 700;
        font-family: "Amiri", sans-serif;
        cursor: pointer; transition: all .2s;
        background: transparent;
        direction: rtl;
      }
      .btn:disabled { opacity: .3; cursor: not-allowed; }
      .btn-green { border-color: var(--green); color: var(--green); }
      .btn-green:hover:not(:disabled) { background: rgba(34,197,94,.2); }
      .btn-red   { border-color: var(--red);   color: var(--red); }
      .btn-red:hover:not(:disabled)   { background: rgba(239,68,68,.2); }
      .btn-blue  { border-color: var(--blue);  color: var(--blue); }
      .btn-blue:hover:not(:disabled)  { background: rgba(59,130,246,.2); }
      .btn-orange{ border-color: var(--orange);color: var(--orange); }
      .btn-orange:hover:not(:disabled){ background: rgba(249,115,22,.2); }
      .btn-gold  { border-color: var(--gold);  color: var(--gold); }
      .btn-gold:hover:not(:disabled)  { background: rgba(212,168,67,.15); }
      .btn-muted { border-color: var(--border); color: var(--muted); }
      .btn-muted:hover:not(:disabled) { background: rgba(255,255,255,.05); }

      .btn-sm { padding: 11px 8px; font-size: 14px; border-radius: 10px; }

      .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; direction: rtl; }

      /* Client list */
      .client-list { display: flex; flex-direction: column; gap: 8px; }
      .client-item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; border-radius: 10px;
        background: rgba(255,255,255,.03);
        border: 1px solid var(--border);
        transition: border-color .2s; direction: rtl;
      }
      .client-item:hover { border-color: var(--gold); }
      .client-item.selected { border-color: var(--gold); background: rgba(212,168,67,.08); }
      .client-dot {
        width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      }
      .client-dot.online  { background: var(--green); }
      .client-dot.offline { background: var(--muted); }
      .client-info { flex: 1; min-width: 0; }
      .client-name {
        font-size: 14px; font-weight: 700;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .client-meta { font-size: 11px; color: var(--muted); }
      .client-actions { display: flex; gap: 4px; }
      .client-actions button {
        padding: 4px 8px; font-size: 11px; border-radius: 6px;
        border: 1px solid var(--border); background: transparent;
        color: var(--muted); cursor: pointer; font-family: inherit;
      }
      .client-actions button:hover { color: var(--gold); border-color: var(--gold); }
      .target-badge {
        display: inline-block; padding: 2px 8px; border-radius: 6px;
        font-size: 10px; font-weight: 700; letter-spacing: .04em;
        margin-right: 8px;
      }
      .target-badge.all { background: rgba(59,130,246,.15); color: var(--blue); }
      .target-badge.one { background: rgba(212,168,67,.15); color: var(--gold); }

      .offline-toggle {
        display: flex; align-items: center; gap: 6px;
        padding: 6px 0; margin-top: 4px;
        font-size: 12px; color: var(--muted); cursor: pointer;
        user-select: none; border: none; background: none;
        font-family: inherit; direction: rtl;
      }
      .offline-toggle:hover { color: var(--text); }
      .offline-toggle .arrow { transition: transform .2s; display: inline-block; }
      .offline-toggle .arrow.open { transform: rotate(90deg); }
      .offline-section { overflow: hidden; }
      .offline-section.collapsed { display: none; }

      .toast {
        position: fixed; bottom: 24px; left: 50%;
        transform: translateX(-50%);
        background: #1e293b; border: 1px solid var(--border);
        border-radius: 10px; padding: 10px 20px;
        font-size: 14px; opacity: 0; transition: opacity .3s;
        pointer-events: none; white-space: nowrap; direction: rtl;
      }
      .toast.show { opacity: 1; }
    </style>
  </head>
  <body>

    <a class="lang-toggle" href="/control">English</a>

    <div class="page-header">
      <span style="font-size:32px">☪</span>
      <div style="font-size:22px;font-weight:700;color:var(--gold)">تحكم جمعة</div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:.04em">لوحة التحكم عن بُعد</div>
    </div>

    <div class="cards-grid">

    <!-- Recording status + start/stop -->
    <div class="card">
      <div class="card-title">🎙 الترجمة الفورية</div>
      <div class="status-row" style="margin-bottom:14px">
        <div class="big-dot" id="dot"></div>
        <div>
          <div class="status-label" id="status-label">جارٍ التحقق…</div>
          <div class="status-sub" id="status-sub">الاتصال بـ KhutbaPi</div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-green" id="btn-start" disabled>▶ بدء</button>
        <button class="btn btn-red"   id="btn-stop"  disabled>■ إيقاف</button>
      </div>
    </div>

    <!-- Connected Clients -->
    <div class="card">
      <div class="card-title">📱 الأجهزة المتصلة <span class="target-badge all" id="target-badge">الكل</span></div>
      <div class="client-list" id="client-list">
        <div style="color:var(--muted);font-size:13px">جارٍ التحميل…</div>
      </div>
      <div style="margin-top:10px">
        <button class="btn btn-muted btn-sm" style="width:100%" id="btn-target-all">الهدف: كل الأجهزة</button>
      </div>
    </div>

    <!-- Client Navigation -->
    <div class="card hidden" id="card-nav">
      <div class="card-title">📺 عرض العميل</div>
      <div class="grid2" style="margin-bottom:10px">
        <button class="btn btn-gold btn-sm" onclick="browserNav('app')">التطبيق الرئيسي</button>
        <button class="btn btn-blue btn-sm" onclick="browserNav('tv')">عرض التلفاز</button>
        <button class="btn btn-muted btn-sm" onclick="browserNav('operator')">لوحة المشغّل</button>
        <button class="btn btn-muted btn-sm" onclick="browserNav('control')">التحكم</button>
      </div>
      <div class="btn-row">
        <button class="btn btn-muted btn-sm" onclick="browserAct('refresh')">&#8635; تحديث</button>
        <button class="btn btn-muted btn-sm" onclick="browserAct('exit-kiosk')">خروج ملء الشاشة</button>
        <button class="btn btn-muted btn-sm" onclick="browserAct('kiosk')">ملء الشاشة</button>
      </div>
    </div>

    <!-- Language switcher -->
    <div class="card hidden" id="card-lang">
      <div class="card-title">🌐 لغة الشاشة</div>
      <div class="btn-row">
        <button class="btn btn-muted btn-sm" id="lang-btn-all" onclick="switchDisplayLang(null)">الكل</button>
        <button class="btn btn-gold  btn-sm" id="lang-btn-ar"  onclick="switchDisplayLang('ar')">عربي</button>
        <button class="btn btn-blue  btn-sm" id="lang-btn-en"  onclick="switchDisplayLang('en')">إنجليزي</button>
        <button class="btn btn-muted btn-sm" id="lang-btn-hu"  onclick="switchDisplayLang('hu')">مجري</button>
      </div>
    </div>

    <!-- Server -->
    <div class="card">
      <div class="card-title">⚙️ الخادم</div>
      <div class="btn-row">
        <button class="btn btn-orange btn-sm" onclick="serverAct('restart')">&#8635; إعادة تشغيل</button>
        <button class="btn btn-muted btn-sm" id="srv-status">الحالة: …</button>
      </div>
    </div>

    <!-- Quick links -->
    <div class="card">
      <div class="card-title">🔗 فتح في هذا المتصفح</div>
      <div class="grid2">
        <a href="/app"     class="btn btn-gold  btn-sm" style="text-decoration:none;text-align:center;display:block">التطبيق الرئيسي</a>
        <a href="/tv"      class="btn btn-blue  btn-sm" style="text-decoration:none;text-align:center;display:block">عرض التلفاز</a>
        <a href="/"        class="btn btn-muted btn-sm" style="text-decoration:none;text-align:center;display:block">لوحة المشغّل</a>
        <a href="/reports" class="btn btn-muted btn-sm" style="text-decoration:none;text-align:center;display:block">التقارير</a>
      </div>
    </div>

    </div><!-- /cards-grid -->

    <div class="toast" id="toast"></div>

    <script>
    (() => {
      const dot      = document.getElementById('dot');
      const label    = document.getElementById('status-label');
      const sub      = document.getElementById('status-sub');
      const btnStart = document.getElementById('btn-start');
      const btnStop  = document.getElementById('btn-stop');
      const srvBtn   = document.getElementById('srv-status');
      const toast    = document.getElementById('toast');
      const clientListEl = document.getElementById('client-list');
      const targetBadge  = document.getElementById('target-badge');
      const btnTargetAll = document.getElementById('btn-target-all');
      let toastTimer = null;

      // ── Targeting state ──
      let _targetClientId = null;
      let _clients = [];
      const cardNav  = document.getElementById('card-nav');
      const cardLang = document.getElementById('card-lang');

      function _targetSuffix() {
        return _targetClientId ? `?target=${encodeURIComponent(_targetClientId)}` : '';
      }

      function _updateCommandCards() {
        const hasOnline = _clients.some(c => c.connected);
        const show = _targetClientId || hasOnline;
        cardNav.classList.toggle('hidden', !show);
        cardLang.classList.toggle('hidden', !show);
      }

      function _updateTargetBadge() {
        if (_targetClientId) {
          const c = _clients.find(x => x.id === _targetClientId);
          targetBadge.textContent = c ? (c.name || c.id) : _targetClientId;
          targetBadge.className = 'target-badge one';
          btnTargetAll.textContent = 'الهدف: كل الأجهزة';
          btnTargetAll.style.borderColor = '';
        } else {
          targetBadge.textContent = 'الكل';
          targetBadge.className = 'target-badge all';
          btnTargetAll.textContent = '✔ يستهدف الكل';
          btnTargetAll.style.borderColor = 'var(--blue)';
        }
        _updateCommandCards();
      }

      btnTargetAll.addEventListener('click', () => {
        _targetClientId = null;
        _updateTargetBadge();
        renderClients();
        showToast('يستهدف كل الأجهزة', true);
      });

      function showToast(msg, ok) {
        toast.textContent = msg;
        toast.style.borderColor = ok ? 'var(--green)' : 'var(--red)';
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
      }

      function applyStatus(data) {
        if (data.recording) {
          dot.className = 'big-dot recording';
          label.textContent = '● يسجّل';
          const s = data.elapsed_seconds;
          sub.textContent = s != null ? `يعمل ${Math.floor(s/60)}د ${s%60}ث` : 'مباشر';
          btnStart.disabled = true;
          btnStop.disabled  = false;
        } else {
          dot.className = 'big-dot';
          label.textContent = 'متوقف';
          sub.textContent = data.listeners > 0 ? `${data.listeners} شاشة متصلة` : 'جاهز';
          btnStart.disabled = false;
          btnStop.disabled  = true;
        }
      }

      async function fetchStatus() {
        try {
          const r = await fetch('/api/control/status');
          applyStatus(await r.json());
        } catch {
          label.textContent = 'غير متصل';
          sub.textContent = 'تعذّر الوصول إلى KhutbaPi';
          dot.className = 'big-dot';
          btnStart.disabled = btnStop.disabled = true;
        }
      }

      async function fetchServerStatus() {
        try {
          const r = await fetch('/api/server/status');
          const d = await r.json();
          srvBtn.textContent = 'الحالة: ' + (d.active ? '✅ يعمل' : '❌ متوقف');
        } catch { srvBtn.textContent = 'الحالة: غير معروف'; }
      }

      async function sendAction(action) {
        btnStart.disabled = btnStop.disabled = true;
        try {
          const r = await fetch(`/api/control/${action}`);
          const d = await r.json();
          showToast(d.ok ? (action==='start' ? '▶ بدأ التسجيل' : '■ توقف التسجيل') : `خطأ: ${d.reason}`, d.ok);
        } catch { showToast('خطأ في الشبكة', false); }
        await fetchStatus();
      }

      // ── Client list ──
      function timeAgo(ts) {
        const diff = (Date.now() / 1000) - ts;
        if (diff < 60) return 'الآن';
        if (diff < 3600) return Math.floor(diff / 60) + 'د';
        if (diff < 86400) return Math.floor(diff / 3600) + 'س';
        return Math.floor(diff / 86400) + 'ي';
      }

      let _offlineExpanded = false;

      function _clientHtml(c) {
        const isTarget = _targetClientId === c.id;
        const icon = c.device_type === 'phone' ? '📱' : (c.device_type === 'screen' ? '🖥️' : '❓');
        const displayName = c.name || c.id;
        const dims = (c.screen_w && c.screen_h) ? `${c.screen_w}×${c.screen_h}` : '';
        const typeName = c.device_type === 'phone' ? 'هاتف' : (c.device_type === 'screen' ? 'شاشة' : 'غير معروف');
        return `
          <div class="client-item${isTarget ? ' selected' : ''}" data-id="${c.id}">
            <div class="client-dot ${c.connected ? 'online' : 'offline'}"></div>
            <div class="client-info">
              <div class="client-name">${icon} ${displayName}</div>
              <div class="client-meta">${typeName} ${dims} · ${c.connected ? 'متصل' : 'آخر ظهور ' + timeAgo(c.last_seen)}</div>
            </div>
            <div class="client-actions">
              <button onclick="selectTarget('${c.id}')" title="استهدف">🎯</button>
              <button onclick="renameClient('${c.id}','${displayName.replace(/'/g, "\\'")}')" title="إعادة تسمية">✏️</button>
              <button onclick="deleteClient('${c.id}')" title="حذف">🗑️</button>
            </div>
          </div>`;
      }

      function renderClients() {
        if (!_clients.length) {
          clientListEl.innerHTML = '<div style="color:var(--muted);font-size:13px">لا توجد أجهزة مسجّلة بعد</div>';
          return;
        }
        const online  = _clients.filter(c => c.connected);
        const offline = _clients.filter(c => !c.connected);
        let html = online.map(_clientHtml).join('');
        if (offline.length) {
          const arrow = _offlineExpanded ? 'open' : '';
          html += `<button class="offline-toggle" onclick="toggleOffline()">
                     <span class="arrow ${arrow}">&#9654;</span>
                     غير متصل (${offline.length})
                   </button>`;
          html += `<div class="offline-section${_offlineExpanded ? '' : ' collapsed'}">
                     ${offline.map(_clientHtml).join('')}
                   </div>`;
        }
        clientListEl.innerHTML = html;
      }

      window.toggleOffline = () => {
        _offlineExpanded = !_offlineExpanded;
        renderClients();
      };

      async function fetchClients() {
        try {
          const r = await fetch('/api/clients');
          const d = await r.json();
          if (d.ok) { _clients = d.clients; renderClients(); _updateCommandCards(); }
        } catch {}
      }

      window.selectTarget = (id) => {
        _targetClientId = (_targetClientId === id) ? null : id;
        _updateTargetBadge();
        renderClients();
        const c = _clients.find(x => x.id === id);
        showToast(_targetClientId ? `يستهدف: ${c?.name || id}` : 'يستهدف كل الأجهزة', true);
      };

      window.renameClient = async (id, current) => {
        const name = prompt('إعادة تسمية الجهاز:', current);
        if (name === null) return;
        try {
          await fetch(`/api/clients/${id}/rename`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name}),
          });
          showToast('✔ تمت إعادة التسمية', true);
          fetchClients();
        } catch { showToast('خطأ في إعادة التسمية', false); }
      };

      window.deleteClient = async (id) => {
        if (!confirm('هل تريد حذف هذا الجهاز من القائمة؟')) return;
        try {
          await fetch(`/api/clients/${id}`, {method: 'DELETE'});
          if (_targetClientId === id) _targetClientId = null;
          _updateTargetBadge();
          showToast('✔ تم الحذف', true);
          fetchClients();
        } catch { showToast('خطأ في الحذف', false); }
      };

      // ── Browser/display actions (with targeting) ──
      window.browserNav = async (page) => {
        showToast(`جارٍ فتح ${page}…`, true);
        try {
          const r = await fetch(`/api/browser/navigate/${page}${_targetSuffix()}`);
          const d = await r.json();
          showToast(d.ok ? '✔ تم الفتح' : `خطأ: ${d.reason}`, d.ok);
        } catch { showToast('خطأ في الشبكة', false); }
      };

      window.browserAct = async (action) => {
        const labels = {
          'refresh':    '✔ تم التحديث',
          'exit-kiosk': 'تم الخروج من ملء الشاشة',
          'kiosk':      'ملء الشاشة مفعّل'
        };
        try {
          const r = await fetch(`/api/browser/${action}${_targetSuffix()}`);
          const d = await r.json();
          showToast(d.ok ? (labels[action] || '✔ تم') : `خطأ: ${d.reason}`, d.ok);
        } catch { showToast('خطأ في الشبكة', false); }
      };

      let _displayLang = null;
      function _updateLangBtns() {
        ['ar','en','hu','all'].forEach(l => {
          const b = document.getElementById('lang-btn-' + l);
          if (!b) return;
          const isActive = (l === 'all') ? (_displayLang === null) : (_displayLang === l);
          b.style.fontWeight = isActive ? '700' : '400';
          b.style.borderColor = isActive ? 'var(--gold)' : '';
        });
      }
      window.switchDisplayLang = async (lang) => {
        _displayLang = (lang === null || lang === 'all') ? null : lang;
        _updateLangBtns();
        const send = _displayLang || 'all';
        try {
          const r = await fetch(`/api/browser/language/${send}${_targetSuffix()}`);
          const d = await r.json();
          showToast(d.ok ? `✔ اللغة: ${send.toUpperCase()}` : `خطأ: ${d.reason}`, d.ok);
        } catch { showToast('خطأ في الشبكة', false); }
      };
      _updateLangBtns();

      window.serverAct = async (action) => {
        showToast('جارٍ إعادة تشغيل الخادم…', true);
        try {
          const r = await fetch(`/api/server/${action}`);
          const d = await r.json();
          showToast(d.ok ? '✔ الخادم يُعاد تشغيله' : `خطأ: ${d.reason}`, d.ok);
        } catch { showToast('خطأ في الشبكة', false); }
        setTimeout(fetchServerStatus, 3000);
      };

      btnStart.addEventListener('click', () => sendAction('start'));
      btnStop.addEventListener('click',  () => sendAction('stop'));

      // Keep a background WebSocket to /stream so this page registers as a client.
      let ws = null;
      function ensureWs() {
        if (ws && ws.readyState <= 1) return;
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/stream`);
        ws.onclose = () => setTimeout(ensureWs, 2000);
        ws.onerror = () => ws.close();
      }
      ensureWs();

      fetchStatus();
      fetchServerStatus();
      fetchClients();
      _updateTargetBadge();
      setInterval(fetchStatus, 3000);
      setInterval(fetchServerStatus, 15000);
