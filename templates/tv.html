<!doctype html>
<html lang="ar">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Juma Live — Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg:      #080d18;
        --surface: #0d1525;
        --border:  #1a2540;
        --gold:    #d4a843;
        --gold-bg: rgba(212,168,67,0.07);
        --accent:  #3b82f6;
        --accent-bg: rgba(59,130,246,0.07);
        --purple:  #a855f7;
        --purple-bg: rgba(168,85,247,0.07);
        --text:    #f0f4ff;
        --muted:   #4a5a7a;
        --green:   #22c55e;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        height: 100%;
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", sans-serif;
        overflow: hidden;
      }

      /* ── Overall layout ──
         Header bar + 3-panel grid filling the remaining height
         Top half: Arabic (full width)
         Bottom half: English (left) + Hungarian (right)
      */
      .screen {
        display: grid;
        grid-template-rows: auto 1fr 1fr;
        height: 100vh;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 24px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        gap: 14px;
        flex-shrink: 0;
      }

      .brand { display: flex; align-items: center; gap: 10px; }
      .crescent { font-size: 22px; }
      .brand-name { font-size: 15px; font-weight: 600; color: var(--gold); }
      .brand-sub  { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

      .header-right { display: flex; align-items: center; gap: 14px; }

      .autoplay-toggle {
        display: flex; align-items: center; gap: 6px;
        font-size: 11px; color: var(--muted); cursor: pointer; user-select: none;
      }
      .autoplay-toggle input { accent-color: var(--green); cursor: pointer; }

      .status-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--muted); flex-shrink: 0;
      }
      .status-dot.live {
        background: var(--green);
        animation: pulse 1.6s ease-in-out infinite;
      }
      @keyframes pulse {
        0%,100% { opacity: .5; transform: scale(.8); }
        50%      { opacity: 1;  transform: scale(1.2); }
      }

      /* ── Panels ── */
      /* Arabic spans full top row */
      .panel-ar {
        grid-column: 1 / 3;
        grid-row: 2;
      }
      .panel-en { grid-row: 3; }
      .panel-hu { grid-row: 3; }

      /* Bottom row: side by side */
      .panels-bottom {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-row: 3;
        overflow: hidden;
      }

      .panel {
        display: flex;
        flex-direction: column;
        padding: 18px 28px 16px;
        overflow: hidden;
        transition: opacity 0.5s ease;
      }
      .panel + .panel {
        border-left: 1px solid var(--border);
      }

      .panel-ar-wrap {
        border-bottom: 1px solid var(--border);
        background: var(--gold-bg);
        overflow: hidden;
      }
      .panel-ar-wrap .panel {
        height: 100%;
      }

      /* Panel label */
      .panel-label {
        font-size: 10px; font-weight: 600; letter-spacing: .1em;
        text-transform: uppercase; color: var(--muted);
        margin-bottom: 10px; flex-shrink: 0;
      }
      .panel-ar-wrap .panel-label { color: rgba(212,168,67,.5); }
      .panel-en-wrap .panel-label { color: rgba(59,130,246,.5); }
      .panel-hu-wrap .panel-label { color: rgba(168,85,247,.5); }

      /* Text */
      .panel-text {
        flex: 1;
        overflow: hidden;
        line-height: 1.75;
        display: flex;
        flex-direction: column;
        justify-content: flex-end; /* latest text at bottom */
      }

      /* Arabic */
      .ar-text {
        font-family: "Amiri", serif;
        font-size: clamp(20px, 2.6vw, 44px);
        direction: rtl;
        text-align: right;
        color: #f8f0dc;
        word-spacing: 4px;
        line-height: 2;
      }

      /* English */
      .en-text {
        font-size: clamp(16px, 1.8vw, 30px);
        font-weight: 300;
        color: var(--text);
        line-height: 1.7;
      }

      /* Hungarian */
      .hu-text {
        font-size: clamp(16px, 1.8vw, 30px);
        font-weight: 300;
        color: #f3e8ff;
        line-height: 1.7;
      }

      /* Chunk-based paragraphs inside each text area */
      .panel-text p {
        margin: 0;
        transition: opacity 0.5s ease;
      }
      .panel-text p + p { margin-top: 8px; }
      .panel-text p.age-0 { opacity: 1; }
      .panel-text p.age-1 { opacity: 0.4; font-size: 0.82em; }

      .placeholder {
        color: var(--muted); font-style: italic;
        font-family: "Inter", sans-serif;
        font-weight: 300; font-size: 0.7em;
      }

      /* ── Dimmed panel when language filter is active ── */
      .panel-ar-wrap.dimmed,
      .panel-en-wrap.dimmed,
      .panel-hu-wrap.dimmed { opacity: 0.12; }

      /* ── Highlighted border when focused ── */
      .panel-ar-wrap.focused { border-bottom-color: var(--gold); }
      .panel-en-wrap.focused { background: var(--accent-bg); }
      .panel-hu-wrap.focused { background: var(--purple-bg); }

      /* ── Audio bar ── */
      .audio-bar {
        display: flex; gap: 2px; align-items: flex-end;
        height: 14px; opacity: 0; transition: opacity .3s;
      }
      .audio-bar.playing { opacity: 1; }
      .audio-bar span {
        display: block; width: 3px; background: var(--green);
        border-radius: 2px; animation: none;
      }
      .audio-bar.playing span:nth-child(1) { animation: bar .8s ease-in-out -.2s infinite; height: 8px; }
      .audio-bar.playing span:nth-child(2) { animation: bar .8s ease-in-out  .0s infinite; height: 14px; }
      .audio-bar.playing span:nth-child(3) { animation: bar .8s ease-in-out  .3s infinite; height: 6px; }
      .audio-bar.playing span:nth-child(4) { animation: bar .8s ease-in-out  .1s infinite; height: 10px; }
      @keyframes bar {
        0%,100% { transform: scaleY(.4); }
        50%      { transform: scaleY(1); }
      }

      .link-home {
        color: var(--muted); text-decoration: none;
        font-size: 11px; padding: 4px 10px;
        border: 1px solid var(--border); border-radius: 6px;
        transition: color .2s;
      }
      .link-home:hover { color: var(--text); }
    </style>
  </head>
  <body>
    <div class="screen">

      <!-- ── Header ── -->
      <header class="header">
        <div class="brand">
          <span class="crescent">☪</span>
          <div>
            <div class="brand-name">Juma Live</div>
            <div class="brand-sub">Display Mode</div>
          </div>
        </div>

        <div class="header-right">
          <div class="audio-bar" id="audio-bar">
            <span></span><span></span><span></span><span></span>
          </div>
          <span id="audio-label" style="font-size:11px;color:var(--muted)">No audio</span>
          <label class="autoplay-toggle">
            <input type="checkbox" id="autoplay-chk" checked />
            Auto-play
          </label>
          <span class="status-dot" id="status-dot"></span>
          <span id="screen-id-badge" style="font-size:10px;color:var(--muted);letter-spacing:.06em;font-family:monospace"></span>
          <a href="/" class="link-home">Operator →</a>
        </div>
      </header>

      <!-- ── Arabic panel (top, full width) ── -->
      <div class="panel-ar-wrap" id="wrap-ar">
        <div class="panel">
          <div class="panel-label">القرآن الكريم · Arabic</div>
          <div class="panel-text ar-text" id="ar-text">
            <span class="placeholder">في انتظار التلاوة…</span>
          </div>
        </div>
      </div>

      <!-- ── Bottom row ── -->
      <div class="panels-bottom">

        <!-- English -->
        <div class="panel-en-wrap" id="wrap-en">
          <div class="panel">
            <div class="panel-label">Translation · English</div>
            <div class="panel-text en-text" id="en-text">
              <span class="placeholder">Awaiting translation…</span>
            </div>
          </div>
        </div>

        <!-- Hungarian -->
        <div class="panel-hu-wrap" id="wrap-hu" style="border-left:1px solid var(--border)">
          <div class="panel">
            <div class="panel-label">Fordítás · Magyar</div>
            <div class="panel-text hu-text" id="hu-text">
              <span class="placeholder">Fordításra vár…</span>
            </div>
          </div>
        </div>

      </div>
    </div><!-- .screen -->

    <script>
    (() => {
      // ── State ──
      const MAX_CHUNKS = 2;
      let audioQueues = { en: [], hu: [] };
      let isPlaying = false;
      let currentAudio = null;

      const arText    = document.getElementById("ar-text");
      const enText    = document.getElementById("en-text");
      const huText    = document.getElementById("hu-text");
      const statusDot = document.getElementById("status-dot");
      const audioBar  = document.getElementById("audio-bar");
      const audioLabel = document.getElementById("audio-label");
      const autoplayChk = document.getElementById("autoplay-chk");

      const wrapAr = document.getElementById("wrap-ar");
      const wrapEn = document.getElementById("wrap-en");
      const wrapHu = document.getElementById("wrap-hu");

      // ── Text rendering: chunk-per-paragraph (typewriter, rolling 2 chunks) ──
      const _queues = new WeakMap();

      function _appendChunk(container, text) {
        const v = String(text || "").trim();
        if (!v) return;

        // Remove placeholder if present
        const ph = container.querySelector(".placeholder");
        if (ph) ph.remove();

        // New paragraph for this chunk
        const p = document.createElement("p");
        container.appendChild(p);

        // Prune to MAX_CHUNKS — oldest paragraph slides off the top
        const all = [...container.querySelectorAll("p")];
        while (all.length > MAX_CHUNKS) { all.shift().remove(); }

        // Update age classes (age-0 = current, age-1 = previous)
        [...container.querySelectorAll("p")].forEach((c, i, arr) => {
          c.className = "age-" + (arr.length - 1 - i);
        });

        // Typewriter at 120ms/word (comfortable reading speed)
        const words = v.split(/\s+/).filter(Boolean);
        _queues.set(p, words.map((w, i) => (i === 0 ? "" : " ") + w));
        _drip(p, container);
      }

      function _drip(p, container) {
        const q = _queues.get(p);
        if (!q || !q.length) return;
        p.textContent += q.shift();
        container.scrollTop = container.scrollHeight;
        setTimeout(() => _drip(p, container), 120 + Math.random() * 30);
      }

      // ── Language filter ──
      function applyLangFilter(lang) {
        const all = (lang === null || lang === "all");
        [
          { wrap: wrapAr, key: "ar" },
          { wrap: wrapEn, key: "en" },
          { wrap: wrapHu, key: "hu" },
        ].forEach(({ wrap, key }) => {
          wrap.classList.toggle("dimmed",  !all && key !== lang);
          wrap.classList.toggle("focused", !all && key === lang);
        });
      }

      // ── Audio ──
      function setAudioPlaying(playing, lang) {
        isPlaying = playing;
        audioBar.className = playing ? "audio-bar playing" : "audio-bar";
        audioLabel.textContent = playing ? "Playing " + lang.toUpperCase() + "…" : "No audio";
      }

      function playNextInQueue() {
        for (const lang of ["en", "hu"]) {
          if (audioQueues[lang].length > 0) {
            const b64 = audioQueues[lang].shift();
            const audio = new Audio("data:audio/mp3;base64," + b64);
            currentAudio = audio;
            setAudioPlaying(true, lang);
            const done = () => { currentAudio = null; setAudioPlaying(false, ""); playNextInQueue(); };
            audio.onended = done; audio.onerror = done;
            audio.play().catch(done);
            return;
          }
        }
      }

      function enqueueAudio(lang, b64) {
        if (!audioQueues[lang]) return;
        audioQueues[lang].push(b64);
        if (!isPlaying && autoplayChk.checked) playNextInQueue();
      }

      // ── Screen ID (corner badge) ──
      let _screenId = null;
      const idBadge = document.getElementById("screen-id-badge");

      function connectScreenWS() {
        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        const ws = new WebSocket(`${proto}//${location.host}/ws/screen?page=tv`);
        ws.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === "init") {
              _screenId = msg.id;
              if (idBadge) idBadge.textContent = "ID: " + msg.id;
            }
            if (msg.type === "set_lang") {
              applyLangFilter(msg.lang === "all" ? null : msg.lang);
            }
          } catch {}
        };
        ws.onclose = () => {
          if (idBadge) idBadge.textContent = "";
          setTimeout(connectScreenWS, 4000);
        };
      }

      // ── SSE: Text (uses new_ar/en/hu to avoid full-text repetition) ──
      function connectTextSSE() {
        const es = new EventSource("/stream/text");
        es.onopen = () => { statusDot.className = "status-dot live"; };
        es.onmessage = (e) => {
          try {
            const d = JSON.parse(e.data);
            if (d.lang_switch !== undefined) {
              applyLangFilter(d.lang_switch);
              return;
            }
            // Use ONLY new_ar/en/hu (current chunk). Never fall back to full
            // accumulated ar/en/hu — that causes the entire khutba to replay.
            if (d.new_ar) _appendChunk(arText, d.new_ar);
            if (d.new_en) _appendChunk(enText, d.new_en);
            if (d.new_hu) _appendChunk(huText, d.new_hu);
          } catch {}
        };
        es.onerror = () => {
          statusDot.className = "status-dot";
          setTimeout(connectTextSSE, 3000);
          es.close();
        };
      }

      // ── SSE: Audio ──
      function connectAudioSSE() {
        const es = new EventSource("/stream/audio");
        es.onmessage = (e) => {
          try {
            const d = JSON.parse(e.data);
            if (d.lang && d.audio) enqueueAudio(d.lang, d.audio);
          } catch {}
        };
        es.onerror = () => { setTimeout(connectAudioSSE, 3000); es.close(); };
      }

      connectScreenWS();
      connectTextSSE();
      connectAudioSSE();
    })();
    </script>
  </body>
</html>
