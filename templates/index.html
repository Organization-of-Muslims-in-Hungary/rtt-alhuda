<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khutba Live Translation - RTT-Alhuda</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .main-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            animation: fadeInDown 0.6s ease;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 5px;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
            font-weight: 300;
        }

        .status-badge {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
            animation: fadeInDown 0.8s ease;
        }

        .status-badge.connected {
            background: rgba(76, 175, 80, 0.4);
            border-color: #4caf50;
        }

        .status-badge.recording {
            background: rgba(33, 150, 243, 0.4);
            border-color: #2196f3;
            animation: pulse 2s infinite;
        }

        .status-badge.error {
            background: rgba(244, 67, 54, 0.4);
            border-color: #f44336;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .controls-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            animation: fadeInUp 0.6s ease;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
        }

        .controls-panel button {
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-start {
            background: linear-gradient(135deg, #4caf50, #45a049);
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
        }

        .btn-stop {
            background: linear-gradient(135deg, #f44336, #da190b);
        }

        .btn-stop:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.4);
        }

        .btn-audio {
            background: linear-gradient(135deg, #2196f3, #1976d2);
            min-width: 160px;
        }

        .btn-audio:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(33, 150, 243, 0.4);
        }

        .btn-audio.active {
            background: linear-gradient(135deg, #ff9800, #f57c00);
        }

        .voice-selector {
            padding: 10px 15px;
            font-size: 14px;
            border-radius: 10px;
            border: 2px solid #ddd;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        .voice-selector:focus {
            outline: none;
            border-color: #2196f3;
            box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.1);
        }

        .content-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 25px;
            animation: fadeInUp 0.7s ease;
        }

        .section-title {
            font-size: 1.1em;
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title.arabic::before {
            content: "العربية";
            font-size: 0.9em;
            background: #1a5e20;
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
        }

        .section-title.english::before {
            content: "English";
            font-size: 0.9em;
            background: #0d47a1;
            color: white;
            padding: 2px 8px;
            border-radius: 5px;
        }

        .text-display {
            min-height: 100px;
            padding: 20px;
            border-radius: 15px;
            background: #f5f5f5;
            border-left: 4px solid #666;
            line-height: 1.8;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }

        .text-display.arabic-text {
            text-align: right;
            direction: rtl;
            color: #1a5e20;
            border-left-color: #1a5e20;
            font-size: 1.3em;
            font-weight: 500;
        }

        .text-display.english-text {
            text-align: left;
            direction: ltr;
            color: #0d47a1;
            border-left-color: #0d47a1;
        }

        .text-display.updated {
            background: #f0f7ff;
            animation: slideIn 0.4s ease;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0.5;
            }
            to {
                opacity: 1;
            }
        }

        .stats {
            font-size: 0.85em;
            color: #888;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 20px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .stat-label {
            font-weight: 600;
            color: #555;
        }

        .stat-value {
            color: #2196f3;
            font-weight: 700;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .controls-panel {
                flex-direction: column;
                gap: 12px;
            }

            .controls-panel button,
            .voice-selector {
                width: 100%;
            }

            .content-container {
                padding: 20px;
            }

            .text-display {
                font-size: 1em;
            }

            .text-display.arabic-text {
                font-size: 1.1em;
            }
        }

        .placeholder-text {
            color: #ccc;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <h1>🕌 Khutba Live Translation</h1>
            <p>RTT-Alhuda Real-Time Translation System</p>
            <div class="status-badge" id="statusBadge">🔴 Connecting...</div>
        </div>

        <div class="controls-panel">
            <button class="btn-start" onclick="startSystem()">▶️ Start Recording</button>
            <button class="btn-stop" onclick="stopSystem()">⏹️ Stop</button>
            <button class="btn-audio" id="audioBtn" onclick="toggleAudio()">🔈 Voice: OFF</button>
            <select class="voice-selector" id="voiceSelect">
                <option value="">🎤 Loading voices...</option>
            </select>
        </div>

        <div class="content-container">
            <div class="section-title arabic">Transcription</div>
            <div class="text-display arabic-text" id="arabicText">
                <span class="placeholder-text">في انتظار الخطبة...</span>
            </div>
        </div>

        <div class="content-container">
            <div class="section-title english">Translation</div>
            <div class="text-display english-text" id="englishText">
                <span class="placeholder-text">Waiting for sermon...</span>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-label">Status:</span>
                    <span class="stat-value" id="statusInfo">Disconnected</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Queue:</span>
                    <span class="stat-value" id="queueInfo">0</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label">Audio:</span>
                    <span class="stat-value" id="audioInfo">OFF</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const eventSource = new EventSource('/stream');
        let reconnectAttempts = 0;
        const statusBadge = document.getElementById('statusBadge');
        const audioBtn = document.getElementById('audioBtn');
        const voiceSelect = document.getElementById('voiceSelect');
        const arabicText = document.getElementById('arabicText');
        const englishText = document.getElementById('englishText');
        
        let audioEnabled = false;
        let availableVoices = [];
        let lastSpokenText = "";
        let isSpeaking = false;

        // --- Voice Loading Logic ---
        function populateVoiceList() {
            availableVoices = window.speechSynthesis.getVoices();
            let englishVoices = availableVoices.filter(voice => voice.lang.startsWith('en'));
            
            voiceSelect.innerHTML = '';
            
            if (englishVoices.length === 0) {
                englishVoices = availableVoices;
            }

            englishVoices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.textContent = `${voice.name} (${voice.lang})`;
                option.value = voice.name;
                voiceSelect.appendChild(option);
            });

            if (englishVoices.length > 0) {
                voiceSelect.value = englishVoices[0].name;
            }
        }

        populateVoiceList();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = populateVoiceList;
        }

        // --- Audio Toggle Logic ---
        function toggleAudio() {
            audioEnabled = !audioEnabled;
            if (audioEnabled) {
                audioBtn.textContent = "🔊 Voice: ON";
                audioBtn.classList.add('active');
                document.getElementById('audioInfo').textContent = "ON";
                
                let wakeUp = new SpeechSynthesisUtterance("Audio enabled.");
                setVoice(wakeUp);
                window.speechSynthesis.speak(wakeUp);
            } else {
                audioBtn.textContent = "🔈 Voice: OFF";
                audioBtn.classList.remove('active');
                document.getElementById('audioInfo').textContent = "OFF";
                window.speechSynthesis.cancel();
                isSpeaking = false;
                lastSpokenText = "";
            }
        }

        function setVoice(utterance) {
            const selectedVoiceName = voiceSelect.value;
            const selectedVoice = availableVoices.find(voice => voice.name === selectedVoiceName);
            if (selectedVoice) {
                utterance.voice = selectedVoice;
            }
        }

        function speakText(text) {
            if (!text || !text.trim()) return;

            // Prevent duplicate speech - only speak if text is new and different
            if (lastSpokenText === text.trim()) {
                return;
            }

            // Cancel any ongoing speech to prevent overlap
            window.speechSynthesis.cancel();
            isSpeaking = true;

            let utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.9;
            utterance.pitch = 1;
            setVoice(utterance);

            utterance.onend = function() {
                isSpeaking = false;
            };

            utterance.onerror = function(event) {
                console.error("Speech synthesis error:", event);
                isSpeaking = false;
            };

            window.speechSynthesis.speak(utterance);
            lastSpokenText = text.trim();
        }

        // --- Server Event Logic ---
        eventSource.onopen = function() {
            updateStatus('connected', '🟢 Connected', 'green');
        };

        eventSource.addEventListener('status', function(e) {
            const data = JSON.parse(e.data);
            document.getElementById('queueInfo').textContent = data.queue_size || 0;
            
            if (data.recording) {
                updateStatus('recording', '🎙️ Recording Live', 'blue');
            } else {
                updateStatus('idle', '⏸️ Idle', 'orange');
            }
        });

        eventSource.addEventListener('chunk', function(e) {
            const data = JSON.parse(e.data);
            console.log('[DEBUG] Chunk event received:', data);  // DEBUG
            
            // Update Arabic transcription
            if (data.merged_transcription) {
                console.log('[DEBUG] Updating Arabic text:', data.merged_transcription);  // DEBUG
                if (arabicText.textContent !== data.merged_transcription) {
                    arabicText.innerHTML = data.merged_transcription;
                    arabicText.classList.add('updated');
                    setTimeout(() => arabicText.classList.remove('updated'), 400);
                }
            } else {
                console.log('[DEBUG] No merged_transcription in data. Available keys:', Object.keys(data));  // DEBUG
            }

            // Update English translation
            if (data.merged_translation) {
                console.log('[DEBUG] Updating English text:', data.merged_translation);  // DEBUG
                if (englishText.textContent !== data.merged_translation) {
                    englishText.innerHTML = data.merged_translation;
                    englishText.classList.add('updated');
                    setTimeout(() => englishText.classList.remove('updated'), 400);
                }
            }

            // Speak only stable, new translations (prevent duplicates)
            if (audioEnabled && data.stable_translation && data.stable_translation.trim()) {
                speakText(data.stable_translation);
            }
        });

        eventSource.onerror = function() {
            console.error('[ERROR] SSE connection error');
            updateStatus('error', '🔴 Connection Lost - Reconnecting...', 'red');
            
            // Close current connection
            eventSource.close();
            reconnectAttempts++;
            
            // Exponential backoff: 1s, 2s, 4s, 8s (max 30s)
            const delay = Math.min(1000 * Math.pow(2, reconnectAttempts - 1), 30000);
            console.log(`[INFO] Reconnecting in ${delay}ms (attempt ${reconnectAttempts})`);
            
            setTimeout(() => {
                // Reconnect without page reload (keeps UI state)
                console.log('[INFO] Attempting reconnection...');
                location.reload();  // Still reload for now to reset connection cleanly
            }, delay);
        };

        function updateStatus(statusId, statusText, statusClass) {
            statusBadge.textContent = statusText;
            statusBadge.className = 'status-badge ' + statusId;
            document.getElementById('statusInfo').textContent = statusText.replace(/[🔴🟢🎙️⏸️]/g, '').trim();
        }

        function startSystem() {
            fetch('/start', { method: 'POST' })
                .catch(err => console.error('Start failed:', err));
        }

        function stopSystem() {
            fetch('/stop', { method: 'POST' })
                .catch(err => console.error('Stop failed:', err));
        }
    </script>
</body>
</html>
