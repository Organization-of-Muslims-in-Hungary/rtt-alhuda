<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Juma Live — KhutbaPi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #0b0f1a;
        --surface: #111827;
        --surface2: #1a2235;
        --border: #1e2d45;
        --border-bright: #2a3f5f;
        --text: #f0f4ff;
        --muted: #6b7fa3;
        --accent: #3b82f6;
        --accent-glow: rgba(59,130,246,0.2);
        --gold: #d4a843;
        --gold-dim: #8a6c28;
        --green: #22c55e;
        --red: #ef4444;
        --arabic-font: "Amiri", serif;
        --ui-font: "Inter", "Segoe UI", sans-serif;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: var(--ui-font);
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Top bar ── */
      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        gap: 12px;
        flex-shrink: 0;
      }

      .topbar-brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .crescent {
        font-size: 26px;
        line-height: 1;
      }

      .brand-name {
        font-size: 18px;
        font-weight: 600;
        color: var(--gold);
        letter-spacing: 0.02em;
      }

      .brand-sub {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .status-badge {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 999px;
        border: 1px solid var(--border);
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        background: var(--bg);
        transition: all 0.3s;
      }

      .status-badge.recording {
        border-color: var(--green);
        color: var(--green);
        background: rgba(34,197,94,0.08);
      }

      .status-badge.error {
        border-color: var(--red);
        color: var(--red);
        background: rgba(239,68,68,0.08);
      }

      .dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }

      .dot.pulse { animation: pulse 1.4s ease-in-out infinite; }

      @keyframes pulse {
        0%, 100% { transform: scale(0.85); opacity: 0.6; }
        50% { transform: scale(1.2); opacity: 1; }
      }

      .controls {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        font-family: var(--ui-font);
        font-size: 13px;
        font-weight: 500;
        padding: 8px 18px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--text);
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }

      button:hover:not(:disabled) { border-color: var(--border-bright); background: #223; }
      button:disabled { opacity: 0.4; cursor: not-allowed; }

      .btn-start { border-color: #166534; background: rgba(22,101,52,0.2); color: #4ade80; }
      .btn-start:hover:not(:disabled) { background: rgba(22,101,52,0.35); }
      .btn-stop  { border-color: #7f1d1d; background: rgba(127,29,29,0.2); color: #f87171; }
      .btn-stop:hover:not(:disabled)  { background: rgba(127,29,29,0.35); }
      .btn-report { border-color: #1e3a8a; background: rgba(30,58,138,0.2); color: #93c5fd; }
      .btn-report:hover:not(:disabled) { background: rgba(30,58,138,0.35); }

      /* ── Body layout ── */
      .body-wrap {
        display: flex;
        flex: 1;
        overflow: hidden;
        min-height: 0;
      }

      /* ── Main content (left) ── */
      .main-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 20px 24px;
        gap: 14px;
        overflow-y: auto;
        min-width: 0;
      }

      /* ── Arabic panel ── */
      .arabic-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-top: 3px solid var(--gold);
        border-radius: 14px;
        padding: 24px 28px;
        position: relative;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        gap: 12px;
      }

      .panel-label {
        font-size: 11px;
        font-weight: 600;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .lang-tag {
        font-size: 10px;
        padding: 2px 8px;
        border-radius: 4px;
        background: var(--surface2);
        border: 1px solid var(--border);
        color: var(--muted);
        letter-spacing: 0.06em;
      }

      .arabic-text {
        font-family: var(--arabic-font);
        font-size: 28px;
        line-height: 1.8;
        direction: rtl;
        text-align: right;
        color: var(--text);
        min-height: 64px;
        word-spacing: 4px;
      }

      .arabic-text:empty::after {
        content: "في انتظار التلاوة...";
        opacity: 0.25;
        font-style: italic;
      }

      /* ── Translation panels ── */
      .trans-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }

      .trans-panel {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
      }

      .trans-panel.en { border-top: 2px solid var(--accent); }
      .trans-panel.hu { border-top: 2px solid #a855f7; }

      .trans-panel .play-btn {
        padding: 4px 12px;
        font-size: 11px;
        border-radius: 6px;
      }

      .trans-text {
        font-size: 18px;
        line-height: 1.75;
        color: var(--text);
        min-height: 60px;
        margin-top: 12px;
        overflow: hidden;
      }

      /* Each translation chunk is its own paragraph */
      .trans-text .chunk {
        margin: 0 0 10px 0;
        transition: opacity 0.6s ease, font-size 0.4s ease;
        padding: 6px 10px;
        border-radius: 6px;
      }
      .trans-text .chunk.age-0 {
        opacity: 1;
        font-size: 18px;
        background: rgba(255,255,255,0.03);
      }
      .trans-text .chunk.age-1 {
        opacity: 0.5;
        font-size: 16px;
      }
      .trans-text .chunk.age-2 {
        opacity: 0.25;
        font-size: 14px;
      }

      .trans-text:not(:has(.chunk))::after {
        content: "Awaiting translation…";
        opacity: 0.25;
        font-style: italic;
        font-size: 14px;
      }

      .trans-panel.hu .trans-text:not(:has(.chunk))::after {
        content: "Fordításra vár…";
      }

      /* ── Report panel ── */
      .report-panel {
        background: rgba(30,58,138,0.12);
        border: 1px solid #1e3a8a;
        border-radius: 12px;
        padding: 16px 20px;
        display: none;
      }

      .report-panel h3 {
        font-size: 13px;
        font-weight: 600;
        color: var(--accent);
        margin-bottom: 10px;
      }

      .report-links { display: flex; flex-wrap: wrap; gap: 8px; }

      .report-links a {
        display: inline-block;
        padding: 6px 14px;
        border-radius: 8px;
        background: rgba(59,130,246,0.15);
        color: #93c5fd;
        text-decoration: none;
        font-size: 12px;
        border: 1px solid rgba(59,130,246,0.3);
        transition: background 0.2s;
      }
      .report-links a:hover { background: rgba(59,130,246,0.3); }

      /* ── Sidebar (right) ── */
      .sidebar {
        width: 340px;
        min-width: 260px;
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        background: var(--surface);
        flex-shrink: 0;
        overflow: hidden;
      }

      .sidebar-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }

      .tab-btn {
        flex: 1;
        padding: 10px 6px;
        font-size: 12px;
        border-radius: 0;
        border: none;
        background: transparent;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }

      .tab-btn.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
        background: var(--accent-glow);
      }

      .tab-panel {
        display: none;
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        font-size: 12px;
        line-height: 1.4;
        font-family: Consolas, "Courier New", monospace;
        gap: 8px;
        flex-direction: column;
      }

      .tab-panel.active { display: flex; }

      .log-line {
        padding: 3px 0;
        color: var(--muted);
        word-break: break-word;
        border-bottom: 1px solid var(--border);
        padding-bottom: 4px;
      }

      .log-line .ts { color: var(--border-bright); margin-right: 6px; }
      .log-line.warn { color: #fbbf24; }
      .log-line.error { color: var(--red); }

      .net-item {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 8px 10px;
        background: var(--surface2);
        margin-bottom: 6px;
        font-family: var(--ui-font);
      }

      .net-head {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 6px;
        font-family: var(--ui-font);
      }

      .net-latency {
        color: var(--green);
        font-weight: 600;
      }

      .net-field { margin-bottom: 4px; }
      .net-key { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
      .net-val {
        font-size: 11px;
        font-family: Consolas, "Courier New", monospace;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 3px 6px;
        white-space: pre-wrap;
        word-break: break-all;
        color: #a5b4fc;
      }

      /* Language switcher */
      .lang-sw {
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 600;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--surface2);
        color: var(--muted);
        cursor: pointer;
        transition: all .15s;
      }
      .lang-sw.active {
        border-color: var(--gold);
        color: var(--gold);
        background: rgba(212,168,67,.1);
      }

      /* ── Mobile ── */
      @media (max-width: 700px) {
        .sidebar { display: none; }
        .trans-grid { grid-template-columns: 1fr; }
        .arabic-text { font-size: 22px; }
        .topbar { padding: 10px 14px; }
        .main-content { padding: 14px; }
      }
    </style>
  </head>
  <body>
    <!-- Top bar -->
    <header class="topbar">
      <div class="topbar-brand">
        <span class="crescent">☪</span>
        <div>
          <div class="brand-name">Juma Live</div>
          <div class="brand-sub">KhutbaPi · Real-time Transcription</div>
        </div>
      </div>

      <div class="status-badge" id="status-badge">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Connecting…</span>
      </div>

      <div class="controls">
        <button class="btn-start" id="start-btn">▶ Start</button>
        <button class="btn-stop"  id="stop-btn"  disabled>■ Stop</button>
        <button class="btn-report" id="report-btn" disabled>⬇ Report</button>
        <div style="display:flex;gap:6px;margin-left:8px">
          <button class="lang-sw" id="lang-all" onclick="switchLang(null)">All</button>
          <button class="lang-sw" id="lang-ar"  onclick="switchLang('ar')">عر</button>
          <button class="lang-sw" id="lang-en"  onclick="switchLang('en')">EN</button>
          <button class="lang-sw" id="lang-hu"  onclick="switchLang('hu')">HU</button>
        </div>
      </div>
    </header>

    <div class="body-wrap">
      <!-- Main area -->
      <main class="main-content">

        <!-- Arabic -->
        <div class="arabic-panel">
          <div class="panel-header">
            <span class="panel-label">Transcription</span>
            <span class="lang-tag">Arabic · العربية</span>
          </div>
          <div class="arabic-text" id="arabic-text"></div>
        </div>

        <!-- Report panel (hidden until report ready) -->
        <div class="report-panel" id="report-panel">
          <h3>📄 Khutbah Report</h3>
          <div class="report-links" id="report-links"></div>
        </div>

        <!-- Translations -->
        <div class="trans-grid">
          <div class="trans-panel en">
            <div class="panel-header">
              <span class="panel-label">Translation · English</span>
              <button class="play-btn" id="play-en-btn" disabled>▶ Play</button>
            </div>
            <div class="trans-text" id="en-text"></div>
          </div>
          <div class="trans-panel hu">
            <div class="panel-header">
              <span class="panel-label">Fordítás · Magyar</span>
              <button class="play-btn" id="play-hu-btn" disabled>▶ Play</button>
            </div>
            <div class="trans-text" id="hu-text"></div>
          </div>
        </div>

      </main>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-tabs">
          <button class="tab-btn active" data-tab="logs">Logs</button>
          <button class="tab-btn" data-tab="network">Network</button>
        </div>
        <div class="tab-panel active" id="tab-logs"></div>
        <div class="tab-panel" id="tab-network"></div>
      </aside>
    </div>

  </body>
  <script>
    (() => {
      // ── Elements ──
      const startBtn    = document.getElementById("start-btn");
      const stopBtn     = document.getElementById("stop-btn");
      const reportBtn   = document.getElementById("report-btn");
      const statusBadge = document.getElementById("status-badge");
      const statusDot   = document.getElementById("status-dot");
      const statusText  = document.getElementById("status-text");
      const arabicText  = document.getElementById("arabic-text");
      const enText      = document.getElementById("en-text");
      const huText      = document.getElementById("hu-text");
      const tabLogs     = document.getElementById("tab-logs");

      // ── Language switcher ──
      const _langPanels = {
        ar: document.querySelector(".arabic-panel"),
        en: document.querySelector(".trans-panel.en"),
        hu: document.querySelector(".trans-panel.hu"),
      };
      let _activeLang = null;  // null = show all

      window.switchLang = function(lang, force) {
        // lang=null means "show all". force=true skips broadcasting back (avoids loop)
        _activeLang = (lang === null || lang === "all") ? null : lang;
        // "all" button active when no specific lang is selected
        const allBtn = document.getElementById("lang-all");
        if (allBtn) allBtn.classList.toggle("active", _activeLang === null);
        ["ar","en","hu"].forEach(l => {
          const btn = document.getElementById("lang-" + l);
          const panel = _langPanels[l];
          const on = (_activeLang === null || _activeLang === l);
          if (panel) panel.style.display = on ? "" : "none";
          if (btn)   btn.classList.toggle("active", _activeLang === l);
        });
        if (!force) fetch("/api/browser/language/" + (_activeLang || "all")).catch(() => {});
      };
      // Start with "all" active
      switchLang(null, /*force=*/true);
      const tabNetwork  = document.getElementById("tab-network");
      const playEnBtn   = document.getElementById("play-en-btn");
      const playHuBtn   = document.getElementById("play-hu-btn");
      const reportPanel = document.getElementById("report-panel");
      const reportLinks = document.getElementById("report-links");

      const MAX_ENTRIES = 60;
      let ws = null;
      let requestedRecording = false;
      const ttsEnChunks = [];
      const ttsHuChunks = [];
      let currentAudio = null;

      // ── Tabs ──
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
          document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("tab-" + btn.dataset.tab).classList.add("active");
        });
      });

      // ── Status helpers ──
      function setStatus(label, state) {
        statusText.textContent = label;
        statusBadge.className = "status-badge " + (state || "");
        statusDot.className = "dot" + (state === "recording" ? " pulse" : "");
      }

      // ── Log helpers ──
      function addLog(msg, level) {
        const el = document.createElement("div");
        el.className = "log-line" + (level ? " " + level : "");
        const ts = new Date().toLocaleTimeString("en-GB", {hour12: false});
        el.innerHTML = `<span class="ts">${ts}</span>${escHtml(msg)}`;
        tabLogs.insertBefore(el, tabLogs.firstChild);
        while (tabLogs.childElementCount > MAX_ENTRIES) tabLogs.lastChild.remove();
      }

      function escHtml(s) {
        return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      }

      // ── Network request card ──
      function addNetworkCard(msg) {
        const card = document.createElement("div");
        card.className = "net-item";
        const ts = new Date().toLocaleTimeString("en-GB", {hour12: false});
        const lat = msg.latencyMs !== undefined ? `${msg.latencyMs}ms` : "–";
        card.innerHTML = `
          <div class="net-head">
            <span>${ts}</span>
            <span class="net-latency">${lat}</span>
          </div>
          <div class="net-field">
            <div class="net-key">New Arabic</div>
            <div class="net-val">${escHtml(msg.transcription || "(silent)")}</div>
          </div>
          <div class="net-field">
            <div class="net-key">English</div>
            <div class="net-val">${escHtml(msg.translation || "–")}</div>
          </div>
          <div class="net-field">
            <div class="net-key">Hungarian</div>
            <div class="net-val">${escHtml(msg.translationHu || "–")}</div>
          </div>`;
        tabNetwork.insertBefore(card, tabNetwork.firstChild);
        while (tabNetwork.childElementCount > MAX_ENTRIES) tabNetwork.lastChild.remove();
      }

      // ── Word-by-word typewriter (chunk-per-paragraph model for EN/HU) ──
      // EN/HU: Each incoming translation chunk gets its own <p class="chunk">
      // Arabic: flat accumulated text (RTL, traditional scroll)
      const MAX_CHUNKS = 3;
      const _typeQueues = new WeakMap();   // el → {words[], timer}

      // For Arabic: flat append to element's textContent (unchanged behaviour)
      function appendFlat(el, chunk) {
        const v = String(chunk || "").trim();
        if (!v) return;
        if (!_typeQueues.has(el)) _typeQueues.set(el, {words: [], timer: null});
        const q = _typeQueues.get(el);
        const words = v.split(/\s+/).filter(Boolean);
        const needsSep = el.textContent.trim().length > 0 || q.words.length > 0;
        words.forEach((w, i) => q.words.push((i === 0 ? (needsSep ? " " : "") : " ") + w));
        if (!q.timer) drip(el, null);
      }

      // For EN/HU: chunk-per-paragraph model
      function appendText(el, chunk) {
        const v = String(chunk || "").trim();
        if (!v) return;

        const p = document.createElement("p");
        p.className = "chunk";
        el.appendChild(p);
        _refreshChunkAges(el);

        const words = v.split(/\s+/).filter(Boolean);
        if (!_typeQueues.has(p)) _typeQueues.set(p, {words: [], timer: null});
        const q = _typeQueues.get(p);
        words.forEach((w, i) => q.words.push((i === 0 ? "" : " ") + w));
        if (!q.timer) drip(p, el);
      }

      function _refreshChunkAges(container) {
        const chunks = [...container.querySelectorAll(".chunk")];
        while (chunks.length > MAX_CHUNKS) {
          clearTypeQueue(chunks[0]);
          chunks.shift().remove();
        }
        const remaining = [...container.querySelectorAll(".chunk")];
        remaining.forEach((c, i) => {
          const age = remaining.length - 1 - i;
          c.className = `chunk age-${age}`;
        });
      }

      function drip(el, container) {
        const q = _typeQueues.get(el);
        if (!q || !q.words.length) { if (q) q.timer = null; return; }
        el.textContent += q.words.shift();
        if (container) container.scrollTop = container.scrollHeight;
        q.timer = setTimeout(() => drip(el, container), 100);  // 100ms per word
      }

      function clearTypeQueue(el) {
        const q = _typeQueues.get(el);
        if (q) { clearTimeout(q.timer); q.words = []; q.timer = null; }
      }

      // ── TTS playback ──
      function stopAudio() {
        if (currentAudio) { currentAudio.pause(); currentAudio.src = ""; currentAudio = null; }
      }

      function playChunks(chunks, btn) {
        stopAudio();
        if (!chunks.length) return;
        btn.disabled = true;
        let i = 0;
        function next() {
          if (i >= chunks.length) { btn.disabled = false; return; }
          const a = new Audio("data:audio/mp3;base64," + chunks[i++]);
          currentAudio = a;
          a.onended = next; a.onerror = next;
          a.play().catch(next);
        }
        next();
      }

      playEnBtn.addEventListener("click", () => playChunks(ttsEnChunks, playEnBtn));
      playHuBtn.addEventListener("click", () => playChunks(ttsHuChunks, playHuBtn));

      // ── Reset ──
      function clearContainer(el) {
        // Stop any running typewriter timers in chunks, then wipe the container
        el.querySelectorAll(".chunk").forEach(p => clearTypeQueue(p));
        el.innerHTML = "";
        // Also clear if it was used as a flat text target (arabicText)
        clearTypeQueue(el);
        el.textContent = "";
      }

      function resetSession() {
        requestedRecording = false;
        clearContainer(arabicText);
        clearContainer(enText);
        clearContainer(huText);
        ttsEnChunks.length = 0;
        ttsHuChunks.length = 0;
        playEnBtn.disabled = true;
        playHuBtn.disabled = true;
        stopAudio();
        tabLogs.replaceChildren();
        tabNetwork.replaceChildren();
        reportPanel.style.display = "none";
        reportLinks.innerHTML = "";
      }

      // ── WebSocket ──
      function ensureSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) return Promise.resolve(ws);

        const proto = location.protocol === "https:" ? "wss:" : "ws:";
        ws = new WebSocket(`${proto}//${location.host}/stream`);

        ws.onopen = () => setStatus("Connected", "");

        ws.onmessage = ({data}) => {
          try {
            const msg = JSON.parse(data);

            if (msg.type === "transcription") {
              appendFlat(arabicText, msg.transcription);
              appendText(enText, msg.translation);
              appendText(huText, msg.translationHu);
              // ttsEnAudio/ttsHuAudio may arrive here (old) or in tts_audio (new async patch)
              if (msg.ttsEnAudio) { ttsEnChunks.push(msg.ttsEnAudio); playEnBtn.disabled = false; }
              if (msg.ttsHuAudio) { ttsHuChunks.push(msg.ttsHuAudio); playHuBtn.disabled = false; }
              addNetworkCard(msg);
              return;
            }

            if (msg.type === "tts_audio") {
              // Async TTS patch: audio arrives separately after transcription text
              if (msg.ttsEnAudio) { ttsEnChunks.push(msg.ttsEnAudio); playEnBtn.disabled = false; }
              if (msg.ttsHuAudio) { ttsHuChunks.push(msg.ttsHuAudio); playHuBtn.disabled = false; }
              return;
            }

            if (msg.type === "report_ready") {
              reportPanel.style.display = "block";
              reportLinks.innerHTML = "";
              (msg.files || []).forEach(f => {
                const a = document.createElement("a");
                a.href = f.url; a.target = "_blank"; a.download = "";
                a.textContent = f.label;
                reportLinks.appendChild(a);
              });
              reportBtn.disabled = false;
              reportBtn.textContent = "⬇ Report";
              return;
            }

            if (msg.type === "log") {
              addLog((msg.level ? "[" + msg.level + "] " : "") + (msg.message || ""), msg.level);
              return;
            }

            if (msg.type === "lang_switch") {
              window.switchLang(msg.lang === "all" ? null : msg.lang, /*force=*/true);
              return;
            }
          } catch(e) { addLog(data); }
        };

        ws.onerror = () => setStatus("Connection error", "error");

        ws.onclose = () => {
          ws = null;
          setStatus(requestedRecording ? "Disconnected" : "Stopped", "");
          startBtn.disabled = false;
          stopBtn.disabled = true;
        };

        return new Promise((res, rej) => {
          ws.addEventListener("open", () => res(ws), {once: true});
          ws.addEventListener("error", () => rej(new Error("WebSocket failed")), {once: true});
        });
      }

      // ── Controls ──
      startBtn.addEventListener("click", async () => {
        try {
          resetSession();
          requestedRecording = true;
          setStatus("Connecting…", "");
          const sock = await ensureSocket();
          sock.send(JSON.stringify({type: "start"}));
          setStatus("Recording", "recording");
          startBtn.disabled = true;
          stopBtn.disabled = false;
          reportBtn.disabled = true;
        } catch(e) {
          setStatus("Error", "error");
          addLog("Start failed: " + e.message, "error");
        }
      });

      stopBtn.addEventListener("click", () => {
        requestedRecording = false;
        stopAudio();
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: "stop"}));
        setStatus("Stopped", "");
        startBtn.disabled = false;
        stopBtn.disabled = true;
        reportBtn.disabled = false;
      });

      reportBtn.addEventListener("click", function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          this.disabled = true;
          this.textContent = "⏳ Generating…";
          ws.send(JSON.stringify({type: "generate_report"}));
        }
      });

      // Auto-connect on load
      ensureSocket().catch(() => setStatus("Offline", "error"));
    })();
  </script>
</html>
