<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>RTT-Alhuda — Live Khutba Translation</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1923;color:#e8e8e8;min-height:100dvh;display:flex;flex-direction:column}
header{background:#1a2a3a;padding:12px 16px;text-align:center;border-bottom:1px solid #2a3a4a}
header h1{font-size:1.1rem;color:#7ec8e3;letter-spacing:.5px}
header .subtitle{font-size:.75rem;color:#8899aa;margin-top:2px}
.controls{display:flex;gap:8px;justify-content:center;padding:10px 16px;background:#152232}
button{border:none;border-radius:8px;padding:10px 20px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .15s}
#btnStart{background:#2ecc71;color:#fff}
#btnStart:hover{background:#27ae60}
#btnStop{background:#e74c3c;color:#fff}
#btnStop:hover{background:#c0392b}
#btnTTS{background:#3498db;color:#fff;position:relative}
#btnTTS.active{background:#e67e22}
#btnTTS.active::after{content:'ON';position:absolute;top:-6px;right:-6px;background:#e67e22;border-radius:50%;width:22px;height:22px;font-size:.6rem;display:flex;align-items:center;justify-content:center}
button:disabled{opacity:.4;cursor:not-allowed}
.status-bar{text-align:center;padding:6px;font-size:.75rem}
.status-bar.live{background:#1a3a2a;color:#2ecc71}
.status-bar.off{background:#3a1a1a;color:#e74c3c}
main{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:16px}
.panel{background:#1a2a3a;border-radius:10px;padding:14px;border:1px solid #2a3a4a}
.panel-label{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:#7ec8e3;margin-bottom:8px}
#arabicText{direction:rtl;text-align:right;font-family:'Traditional Arabic','Amiri','Noto Naskh Arabic',serif;font-size:1.35rem;line-height:2;color:#f0e6d3}
#englishText{font-size:1.05rem;line-height:1.7;color:#d0d8e0}
.empty{color:#556;font-style:italic}
footer{text-align:center;padding:8px;font-size:.65rem;color:#445;background:#0a1018}
</style>
</head>
<body>

<header>
  <h1>🕌 RTT-Alhuda</h1>
  <div class="subtitle">Juma Khutba — Live Translation</div>
</header>

<div class="controls">
  <button id="btnStart">▶ Start</button>
  <button id="btnStop" disabled>⏹ Stop</button>
  <button id="btnTTS">🔊 Audio</button>
</div>

<div id="statusBar" class="status-bar off">● Stopped</div>

<main>
  <div class="panel">
    <div class="panel-label">العربية — Arabic</div>
    <div id="arabicText" class="empty">Waiting for khutba…</div>
  </div>
  <div class="panel">
    <div class="panel-label">English — Translation</div>
    <div id="englishText" class="empty">Waiting for khutba…</div>
  </div>
</main>

<footer>RTT-Alhuda · Powered by Gemini AI</footer>

<script>
const $ar   = document.getElementById('arabicText');
const $en   = document.getElementById('englishText');
const $bar  = document.getElementById('statusBar');
const $start= document.getElementById('btnStart');
const $stop = document.getElementById('btnStop');
const $tts  = document.getElementById('btnTTS');

let ttsOn = false;
let lastSpoken = '';
let evtSource = null;

// --- SSE ---
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/stream');

  evtSource.addEventListener('transcript', e => {
    const d = JSON.parse(e.data);
    if (d.arabic) { $ar.textContent = d.arabic; $ar.classList.remove('empty'); }
    if (d.english) { $en.textContent = d.english; $en.classList.remove('empty'); speak(d.english); }
    // Auto-scroll panels into view
    $en.scrollIntoView({behavior:'smooth', block:'end'});
  });

  evtSource.addEventListener('status', e => {
    const d = JSON.parse(e.data);
    setRunning(d.running);
  });

  evtSource.onerror = () => {
    setTimeout(connectSSE, 3000);
  };
}

function setRunning(on) {
  $bar.className = 'status-bar ' + (on ? 'live' : 'off');
  $bar.textContent = on ? '● Live — Listening…' : '● Stopped';
  $start.disabled = on;
  $stop.disabled = !on;
}

// --- Controls ---
$start.addEventListener('click', async () => {
  $ar.textContent = ''; $ar.classList.add('empty');
  $en.textContent = ''; $en.classList.add('empty');
  lastSpoken = '';
  await fetch('/start', {method:'POST'});
});

$stop.addEventListener('click', async () => {
  await fetch('/stop', {method:'POST'});
});

// --- TTS ---
$tts.addEventListener('click', () => {
  ttsOn = !ttsOn;
  $tts.classList.toggle('active', ttsOn);
  // iOS Safari requires a speechSynthesis call from a user gesture
  if (ttsOn) {
    const u = new SpeechSynthesisUtterance('');
    speechSynthesis.speak(u);
  } else {
    speechSynthesis.cancel();
  }
});

function speak(text) {
  if (!ttsOn || !text) return;
  // Only speak genuinely new text
  const delta = text.startsWith(lastSpoken) ? text.slice(lastSpoken.length).trim() : text;
  if (!delta) return;
  lastSpoken = text;
  const u = new SpeechSynthesisUtterance(delta);
  u.lang = 'en-US';
  u.rate = 1.0;
  speechSynthesis.speak(u);
}

// --- Init ---
connectSSE();
</script>
</body>
</html>
