<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Transcription</title>
    <style>
      :root {
        --bg: #111111;
        --text: #f1f1f1;
        --muted: #9ca3af;
        --line: #374151;
        --accent: #0ea5e9;
        --ok: #16a34a;
        --error: #dc2626;

        /* Additional color variables */
        --hover-border: #cbd5e1;
        --btn-start-border: #bbf7d0;
        --btn-start-bg: #f0fdf4;
        --btn-start-text: #166534;
        --btn-stop-border: #fecaca;
        --btn-stop-bg: #fef2f2;
        --btn-stop-text: #991b1b;
        --audio-state: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .wrap {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      .sub {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 14px;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 999px;
        font-size: 13px;
        margin-bottom: 16px;
        background: var(--bg);
      }

      .controls {
        display: flex;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }

      button {
        border: 1px solid var(--line);
        background: var(--bg);
        color: var(--text);
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 14px;
        cursor: pointer;
      }

      button:hover {
        border-color: var(--hover-border);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-start {
        border-color: var(--btn-start-border);
        background: var(--btn-start-bg);
        color: var(--btn-start-text);
      }

      .btn-stop {
        border-color: var(--btn-stop-border);
        background: var(--btn-stop-bg);
        color: var(--btn-stop-text);
      }

      .panes {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 14px;
        align-items: start;
      }

      .panel-title {
        margin: 0 0 8px;
        font-size: 14px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .log-lines {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        padding: 10px;
        max-height: 70vh;
        overflow: auto;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.35;
      }

      .audio-list {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        padding: 10px;
        max-height: 38vh;
        overflow: auto;
        margin-top: 12px;
      }

      .raw-list {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        padding: 10px;
        max-height: 38vh;
        overflow: auto;
        margin-top: 12px;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.35;
      }

      .request-list {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: var(--bg);
        padding: 10px;
        max-height: 38vh;
        overflow: auto;
        margin-top: 12px;
      }

      .request-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 8px;
        background: var(--bg);
      }

      .request-head {
        color: var(--muted);
        margin-bottom: 6px;
        font-weight: 600;
      }

      .request-kv {
        margin-bottom: 8px;
      }

      .request-key {
        color: var(--muted);
        font-size: 12px;
        margin-bottom: 2px;
      }

      .request-value {
        white-space: pre-wrap;
        word-break: break-word;
        font-family: Consolas, "Courier New", monospace;
        font-size: 12px;
        line-height: 1.35;
      }

      .raw-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 8px;
        background: var(--bg);
      }

      .raw-title {
        color: var(--muted);
        margin-bottom: 6px;
        font-weight: 600;
      }

      .raw-text {
        white-space: pre-wrap;
        word-break: break-word;
      }

      .audio-item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 8px;
        margin-bottom: 8px;
        background: var(--bg);
      }

      .audio-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
        margin-bottom: 6px;
        font-size: 12px;
        color: var(--muted);
      }

      .audio-state {
        font-weight: 600;
        color: var(--audio-state);
      }

      .audio-meta {
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
        white-space: pre-wrap;
      }

      .log-line {
        margin-bottom: 6px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent);
        animation: pulse 1.2s infinite ease-in-out;
      }

      @keyframes pulse {
        0% {
          transform: scale(0.9);
          opacity: 0.6;
        }
        50% {
          transform: scale(1.2);
          opacity: 1;
        }
        100% {
          transform: scale(0.9);
          opacity: 0.6;
        }
      }

      .stream-panel {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px;
        background: var(--bg);
        margin-bottom: 12px;
      }

      .label {
        font-size: 12px;
        color: var(--muted);
        margin: 0 0 8px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .text {
        white-space: pre-wrap;
        line-height: 1.45;
        font-size: 16px;
        min-height: 56px;
      }

      .arabic {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        direction: rtl;
      }

      .provisional {
        opacity: 0.72;
        font-style: italic;
      }

      .error {
        color: var(--error);
        font-weight: 600;
      }

      @media (max-width: 640px) {
        .wrap {
          padding: 14px;
        }
        h1 {
          font-size: 22px;
        }
        .text {
          font-size: 15px;
        }
        .panes {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>Live Transcription</h1>
      <p class="sub">
        Frontend controls start/stop while backend captures and chunks
        microphone audio.
      </p>

      <div class="status" id="status">
        <span class="dot" aria-hidden="true"></span>
        <span id="status-text">Connecting...</span>
      </div>

      <div class="controls">
        <button class="btn-start" id="start-btn">Start Recording</button>
        <button class="btn-stop" id="stop-btn" disabled>Stop Recording</button>
        <button id="report-btn" disabled style="border-color:#93c5fd;background:#eff6ff;color:#1e40af;">Generate Report</button>
      </div>

      <div id="report-panel" style="display:none;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px;background:#0a1628;">
        <h3 style="margin:0 0 10px;font-size:15px;color:var(--accent);">Khutbah Report</h3>
        <div id="report-links"></div>
      </div>

      <div class="panes">
        <section>
          <h2 class="panel-title">Live Text</h2>
          <section class="stream-panel">
            <div class="label">Transcription</div>
            <div class="text arabic" id="transcription-stream">
              <span id="transcription-committed"></span
              ><span id="transcription-provisional" class="provisional"></span>
            </div>
          </section>
          <section class="stream-panel">
            <div class="label" style="display:flex;align-items:center;gap:8px;">Translation (English) <button id="play-en-btn" style="font-size:12px;padding:4px 10px;border-radius:6px;">▶ Play</button></div>
            <div class="text" id="translation-stream">
              <span id="translation-committed"></span
              ><span id="translation-provisional" class="provisional"></span>
            </div>
          </section>
          <section class="stream-panel">
            <div class="label" style="display:flex;align-items:center;gap:8px;">Fordítás (Magyar) <button id="play-hu-btn" style="font-size:12px;padding:4px 10px;border-radius:6px;">▶ Play</button></div>
            <div class="text" id="translation-hu-stream">
              <span id="translation-hu-committed"></span
              ><span id="translation-hu-provisional" class="provisional"></span>
            </div>
          </section>
        </section>
        <section>
          <h2 class="panel-title" style="margin-top: 12px">Network Requests</h2>
          <section
            class="request-list"
            style="max-height: 80vh"
            id="network-list"
          ></section>
          <h2 class="panel-title" style="margin-top: 12px">Backend Logs</h2>
          <section class="log-lines" id="server-log"></section>
        </section>
      </div>
    </main>
  </body>
  <script>
    (() => {
      const startBtn = document.getElementById("start-btn");
      const stopBtn = document.getElementById("stop-btn");
      const statusText = document.getElementById("status-text");
      const MAX_DEBUG_ENTRIES = 50;

      let ws = null;
      let requestedRecording = false;

      function log(msg) {
        console.log(`[${new Date().toISOString()}] ${msg}`);
      }

      // UI helpers for showing model/debug info
      const networkList = document.getElementById("network-list");
      const serverLog = document.getElementById("server-log");
      const transcriptionCommitted = document.getElementById(
        "transcription-committed",
      );
      const translationCommitted = document.getElementById(
        "translation-committed",
      );
      const translationHuCommitted = document.getElementById(
        "translation-hu-committed",
      );

      // TTS audio storage — only plays on button click
      const ttsChunksEn = [];  // collected English MP3 base64 chunks
      const ttsChunksHu = [];  // collected Hungarian MP3 base64 chunks
      let currentAudio = null;

      function stopCurrentAudio() {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio.src = '';
          currentAudio = null;
        }
      }

      function playAllChunks(chunks, btn) {
        stopCurrentAudio();
        if (chunks.length === 0) return;
        let idx = 0;
        btn.disabled = true;
        function playNext() {
          if (idx >= chunks.length) { btn.disabled = false; return; }
          const audio = new Audio('data:audio/mp3;base64,' + chunks[idx++]);
          currentAudio = audio;
          audio.onended = playNext;
          audio.onerror = playNext;
          audio.play().catch(playNext);
        }
        playNext();
      }

      function appendCommittedText(target, chunk, joiner = " ") {
        if (!target) return;
        const value = String(chunk ?? "").trim();
        if (!value) return;

        if (target.textContent && target.textContent.trim().length > 0) {
          target.textContent += joiner + value;
          return;
        }

        target.textContent = value;
      }

      function prependChild(container, child) {
        if (!container) return;
        container.insertBefore(child, container.firstChild);
      }

      function disposeDebugEntry(entry) {
        if (!entry) return;

        entry.querySelectorAll("audio").forEach((audio) => {
          audio.src = "";
          audio.removeAttribute("src");
          if (typeof audio.load === "function") {
            audio.load();
          }
        });

        entry.remove();
      }

      function trimDebugEntries(container) {
        if (!container) return;

        while (container.childElementCount > MAX_DEBUG_ENTRIES) {
          disposeDebugEntry(container.lastElementChild);
        }
      }

      function addNetworkRequest(msg) {
        const wrapper = document.createElement("div");
        wrapper.className = "request-item";

        const head = document.createElement("div");
        head.className = "request-head";
        const latencyStr =
          msg.latencyMs !== undefined ? ` (${msg.latencyMs}ms)` : "";
        head.textContent = `Request — ${new Date().toLocaleTimeString()}${latencyStr}`;
        wrapper.appendChild(head);

        if (msg.originalAudioChunk) {
          const audioDiv = document.createElement("div");
          audioDiv.style.marginBottom = "8px";

          const audio = document.createElement("audio");
          audio.controls = true;
          audio.src = "data:audio/wav;base64," + msg.originalAudioChunk;
          audio.preload = "metadata";
          audio.style.width = "100%";
          audio.style.height = "32px";
          audioDiv.appendChild(audio);

          const meta = document.createElement("div");
          meta.className = "audio-meta";
          meta.style.marginBottom = "8px";
          meta.textContent = `${msg.processedChunks || 1} chunk, duration ${Number(msg.chunkDurationSeconds || 0).toFixed(3)}s (window ${msg.windowSeconds}s)`;
          audioDiv.appendChild(meta);
          wrapper.appendChild(audioDiv);
        }

        const ctxTitle = document.createElement("div");
        ctxTitle.className = "request-key";
        ctxTitle.textContent = "Context:";
        wrapper.appendChild(ctxTitle);

        const ctxText = document.createElement("div");
        ctxText.className = "request-value";
        ctxText.textContent = `Transcription: ${msg.originalTranscription || "(empty)"}\nTranslation: ${msg.originalTranslation || "(empty)"}`;
        ctxText.style.background = "var(--bg)";
        ctxText.style.border = "1px solid var(--line)";
        ctxText.style.padding = "4px";
        ctxText.style.borderRadius = "4px";
        ctxText.style.marginBottom = "8px";
        wrapper.appendChild(ctxText);

        const resTitle = document.createElement("div");
        resTitle.className = "request-key";
        resTitle.textContent = "Response Payload:";
        wrapper.appendChild(resTitle);

        if (msg.rawResponse) {
          const resPre = document.createElement("pre");
          resPre.className = "request-value";
          resPre.style.background = "var(--bg)";
          resPre.style.border = "1px solid var(--line)";
          resPre.style.padding = "4px";
          resPre.style.borderRadius = "4px";
          resPre.style.margin = "0";
          try {
            resPre.textContent = JSON.stringify(
              JSON.parse(msg.rawResponse),
              null,
              2,
            );
          } catch (e) {
            resPre.textContent = msg.rawResponse;
          }
          wrapper.appendChild(resPre);
        }

        prependChild(networkList, wrapper);
        trimDebugEntries(networkList);
      }

      function appendServerLog(msg) {
        const el = document.createElement("div");
        el.className = "log-line";
        el.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        prependChild(serverLog, el);
      }

      function updateUiForRecording(isRecording) {
        statusText.textContent = isRecording ? "Recording" : "Connected";
        startBtn.disabled = isRecording;
        stopBtn.disabled = !isRecording;
      }

      function resetSessionState() {
        requestedRecording = false;
        transcriptionCommitted.textContent = "";
        translationCommitted.textContent = "";
        translationHuCommitted.textContent = "";
        ttsChunksEn.length = 0;
        ttsChunksHu.length = 0;
        stopCurrentAudio();
        networkList.replaceChildren();
        serverLog.replaceChildren();
      }

      function ensureSocket() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          return Promise.resolve(ws);
        }

        if (ws && ws.readyState === WebSocket.CONNECTING) {
          return new Promise((resolve, reject) => {
            const onOpen = () => {
              cleanup();
              resolve(ws);
            };
            const onError = () => {
              cleanup();
              reject(new Error("WebSocket connection failed"));
            };
            const cleanup = () => {
              ws.removeEventListener("open", onOpen);
              ws.removeEventListener("error", onError);
            };
            ws.addEventListener("open", onOpen);
            ws.addEventListener("error", onError);
          });
        }

        const wsProtocol = window.location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `${wsProtocol}//${window.location.host}/stream`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          log("WebSocket connected");
          statusText.textContent = "Connected";
        };

        ws.onmessage = (event) => {
          try {
            const msg = JSON.parse(event.data);
            if (msg?.type === "transcription") {
              const trans = msg.transcription ?? "";
              const trad = msg.translation ?? "";
              const tradHu = msg.translationHu ?? "";
              appendCommittedText(transcriptionCommitted, trans);
              appendCommittedText(translationCommitted, trad, " ");
              appendCommittedText(translationHuCommitted, tradHu, " ");

              // Store TTS audio for on-demand playback
              if (msg.ttsEnAudio) ttsChunksEn.push(msg.ttsEnAudio);
              if (msg.ttsHuAudio) ttsChunksHu.push(msg.ttsHuAudio);

              addNetworkRequest(msg);
              return;
            }

            if (msg?.type === "audio_chunk") {
              return;
            }

            if (msg?.type === "report_ready") {
              const panel = document.getElementById("report-panel");
              const links = document.getElementById("report-links");
              panel.style.display = "block";
              links.innerHTML = "";
              (msg.files || []).forEach(f => {
                const a = document.createElement("a");
                a.href = f.url;
                a.download = "";
                a.target = "_blank";
                a.textContent = f.label;
                a.style.cssText = "display:inline-block;margin:4px 8px 4px 0;padding:6px 14px;border-radius:8px;background:#1e3a5f;color:#93c5fd;text-decoration:none;font-size:13px;";
                links.appendChild(a);
              });
              document.getElementById("report-btn").disabled = false;
              document.getElementById("report-btn").textContent = "Generate Report";
              return;
            }

            if (msg?.type === "log") {
              const level = msg.level ? `[${msg.level}] ` : "";
              appendServerLog(level + (msg.message || ""));
              return;
            }

            appendServerLog(JSON.stringify(msg));
          } catch (e) {
            appendServerLog(event.data);
          }
        };

        ws.onerror = () => {
          statusText.textContent = "Error";
          appendServerLog("WebSocket error");
        };

        ws.onclose = () => {
          log("WebSocket closed");
          ws = null;
          if (requestedRecording) {
            statusText.textContent = "Disconnected";
          } else {
            statusText.textContent = "Stopped";
          }
          startBtn.disabled = false;
          stopBtn.disabled = true;
        };

        return new Promise((resolve, reject) => {
          ws.addEventListener(
            "open",
            () => {
              resolve(ws);
            },
            { once: true },
          );
          ws.addEventListener(
            "error",
            () => {
              reject(new Error("WebSocket connection failed"));
            },
            { once: true },
          );
        });
      }

      startBtn.addEventListener("click", async () => {
        try {
          resetSessionState();
          requestedRecording = true;
          const socket = await ensureSocket();
          socket.send(JSON.stringify({ type: "start" }));
          updateUiForRecording(true);
        } catch (err) {
          log("start error: " + (err?.message || err));
          statusText.textContent = "Error";
        }
      });

      stopBtn.addEventListener("click", () => {
        requestedRecording = false;
        stopCurrentAudio();
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: "stop" }));
        }
        statusText.textContent = ws ? "Connected" : "Stopped";
        startBtn.disabled = false;
        stopBtn.disabled = true;
        document.getElementById("report-btn").disabled = false;
      });

      document.getElementById("report-btn").addEventListener("click", function() {
        if (ws && ws.readyState === WebSocket.OPEN) {
          this.disabled = true;
          this.textContent = "Generating...";
          ws.send(JSON.stringify({ type: "generate_report" }));
        }
      });

      document.getElementById("play-en-btn").addEventListener("click", function() {
        playAllChunks(ttsChunksEn, this);
      });
      document.getElementById("play-hu-btn").addEventListener("click", function() {
        playAllChunks(ttsChunksHu, this);
      });
    })();
  </script>
</html>
