<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live Transcription</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --line: #e5e7eb;
      --accent: #0ea5e9;
      --ok: #16a34a;
      --error: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 16px;
      background: #fafafa;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    button:hover {
      border-color: #cbd5e1;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-start {
      border-color: #bbf7d0;
      background: #f0fdf4;
      color: #166534;
    }

    .btn-stop {
      border-color: #fecaca;
      background: #fef2f2;
      color: #991b1b;
    }

    .panes {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 14px;
      align-items: start;
    }

    .panel-title {
      margin: 0 0 8px;
      font-size: 14px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .log-lines {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      max-height: 70vh;
      overflow: auto;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.35;
    }

    .audio-list {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      max-height: 38vh;
      overflow: auto;
      margin-top: 12px;
    }

    .raw-list {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      padding: 10px;
      max-height: 38vh;
      overflow: auto;
      margin-top: 12px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 12px;
      line-height: 1.35;
    }

    .raw-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      background: #fff;
    }

    .raw-title {
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .raw-text {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .audio-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 8px;
      background: #fff;
    }

    .audio-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .audio-state {
      font-weight: 600;
      color: #0f766e;
    }

    .audio-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
      white-space: pre-wrap;
    }

    .log-line {
      margin-bottom: 6px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(0.9); opacity: 0.6; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(0.9); opacity: 0.6; }
    }

    .stream-panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
      margin-bottom: 12px;
    }

    .label {
      font-size: 12px;
      color: var(--muted);
      margin: 0 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .text {
      white-space: pre-wrap;
      line-height: 1.45;
      font-size: 16px;
      min-height: 56px;
    }

    .provisional {
      opacity: 0.72;
      font-style: italic;
    }

    .error {
      color: var(--error);
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .wrap { padding: 14px; }
      h1 { font-size: 22px; }
      .text { font-size: 15px; }
      .panes { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>Live Transcription + Translation</h1>
    <p class="sub">Captures microphone audio in chunks and appends results as they arrive.</p>

    <div class="status" id="status">
      <span class="dot" aria-hidden="true"></span>
      <span id="status-text">Connecting...</span>
    </div>

    <div class="controls">
      <button class="btn-start" id="start-btn">Start Recording</button>
      <button class="btn-stop" id="stop-btn" disabled>Stop Recording</button>
    </div>

    <div class="panes">
      <section>
        <h2 class="panel-title">Live Text</h2>
        <section class="stream-panel">
          <div class="label">Transcription</div>
          <div class="text" id="transcription-stream">
            <span id="transcription-committed"></span><span id="transcription-provisional" class="provisional"></span>
          </div>
        </section>
        <section class="stream-panel">
          <div class="label">Translation</div>
          <div class="text" id="translation-stream">
            <span id="translation-committed"></span><span id="translation-provisional" class="provisional"></span>
          </div>
        </section>
      </section>
      <section>
          <h2 class="panel-title" style="margin-top: 12px;">Audio Queue / Chunks</h2>
          <section class="audio-list" id="audio-list"></section>
        <h2 class="panel-title" style="margin-top: 12px;">Raw Model Responses</h2>
        <section class="raw-list" id="raw-list"></section>
        <h2 class="panel-title">Backend Logs</h2>
        <section class="log-lines" id="server-log"></section>
      </section>
    </div>
  </main>

  <script>
    const transcriptionCommitted = document.getElementById('transcription-committed');
    const transcriptionProvisional = document.getElementById('transcription-provisional');
    const translationCommitted = document.getElementById('translation-committed');
    const translationProvisional = document.getElementById('translation-provisional');
    const serverLog = document.getElementById('server-log');
    const audioList = document.getElementById('audio-list');
    const rawList = document.getElementById('raw-list');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');

    function escapeHtml(text) {
      return (text || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function addServerLog(message) {
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = 'log-line';
      div.innerHTML = `[${time}] ${escapeHtml(message)}`;
      serverLog.prepend(div);
    }

    function renderMergedText(payload) {
      const committedTrans = (payload.committed_transcription || '').trim();
      const provisionalTrans = (payload.provisional_transcription || '').trim();
      const committedTranslationText = (payload.committed_translation || '').trim();
      const provisionalTranslationText = (payload.provisional_translation || '').trim();

      transcriptionCommitted.textContent = committedTrans;
      transcriptionProvisional.textContent = provisionalTrans ? ` ${provisionalTrans}` : '';
      translationCommitted.textContent = committedTranslationText;
      translationProvisional.textContent = provisionalTranslationText ? ` ${provisionalTranslationText}` : '';
    }

    function formatSeconds(value) {
      if (typeof value !== 'number') {
        return '-';
      }
      return `${value.toFixed(2)}s`;
    }

    function upsertAudioItem(payload) {
      const chunkId = Number(payload.chunk_index || 0);
      if (!chunkId) {
        return;
      }

      let item = audioList.querySelector(`[data-chunk-id="${chunkId}"]`);
      if (!item) {
        item = document.createElement('article');
        item.className = 'audio-item';
        item.dataset.chunkId = String(chunkId);
        item.innerHTML = `
          <div class="audio-head">
            <div>Chunk <span class="chunk-id"></span></div>
            <div class="audio-state"></div>
          </div>
          <audio controls preload="none" style="width: 100%;"></audio>
          <div class="audio-meta"></div>
        `;
        audioList.prepend(item);
      }

      const chunkIdEl = item.querySelector('.chunk-id');
      const stateEl = item.querySelector('.audio-state');
      const audioEl = item.querySelector('audio');
      const metaEl = item.querySelector('.audio-meta');

      chunkIdEl.textContent = String(chunkId);
      stateEl.textContent = payload.state || 'unknown';

      if (payload.audio_url) {
        audioEl.src = `${payload.audio_url}?v=${chunkId}`;
      }

      const metaParts = [
        `bytes: ${payload.audio_bytes ?? '-'}`,
        `record: ${formatSeconds(Number(payload.record_seconds))}`,
        `window: ${payload.start_ts ?? '-'}-${payload.end_ts ?? '-'}s`,
        `overlap: ${formatSeconds(Number(payload.overlap_seconds))}`,
        `queue wait: ${formatSeconds(Number(payload.queue_wait_seconds))}`,
        `receive: ${formatSeconds(Number(payload.receive_seconds))}`,
        `process: ${formatSeconds(Number(payload.process_seconds))}`,
        `total: ${formatSeconds(Number(payload.total_seconds))}`,
        `queue size: ${payload.queue_size ?? '-'}`,
      ];
      metaEl.textContent = metaParts.join(' | ');
    }

    function addRawChunk(payload) {
      const chunkId = Number(payload.chunk_index || 0);
      if (!chunkId) {
        return;
      }

      const item = document.createElement('article');
      item.className = 'raw-item';
      const shownRaw = (payload.raw || '').trim() || '(empty raw response)';
      item.innerHTML = `
        <div class="raw-title">Chunk ${chunkId} Raw (${(shownRaw || '').length} chars)</div>
        <div class="raw-text">${escapeHtml(shownRaw)}</div>
      `;
      rawList.prepend(item);
    }

    function setRecordingState(isRecording, queueSize = 0, overlapRatio = 0, strideSeconds = 0) {
      startBtn.disabled = isRecording;
      stopBtn.disabled = !isRecording;
      statusText.textContent = isRecording
        ? `Recording in progress... (queue: ${queueSize}, overlap: ${Math.round(overlapRatio * 100)}%, stride: ${Number(strideSeconds).toFixed(1)}s)`
        : 'Connected. Click Start to begin.';
    }

    async function postControl(path) {
      const response = await fetch(path, { method: 'POST' });
      if (!response.ok) {
        throw new Error(`Request failed: ${response.status}`);
      }
      return response.json();
    }

    startBtn.addEventListener('click', async () => {
      try {
        await postControl('/start');
      } catch (err) {
        addServerLog(`Start failed: ${err.message}`);
      }
    });

    stopBtn.addEventListener('click', async () => {
      try {
        await postControl('/stop');
      } catch (err) {
        addServerLog(`Stop failed: ${err.message}`);
      }
    });

    const source = new EventSource('/stream');

    source.onopen = () => {
      statusText.textContent = 'Connected. Click Start to begin.';
      addServerLog('SSE connection opened.');
    };

    source.onerror = () => {
      statusText.textContent = 'Connection error. Reload to reconnect.';
      addServerLog('SSE connection error.');
    };

    source.addEventListener('status', (event) => {
      const payload = JSON.parse(event.data);
      setRecordingState(
        Boolean(payload.recording),
        Number(payload.queue_size || 0),
        Number(payload.overlap_ratio || 0),
        Number(payload.stride_seconds || 0)
      );
    });

    source.addEventListener('log', (event) => {
      const payload = JSON.parse(event.data);
      addServerLog(payload.message || '');
    });

    source.addEventListener('error', (event) => {
      const payload = JSON.parse(event.data);
      addServerLog(`Worker error: ${payload.message || 'Unknown error'}`);
      setRecordingState(false, 0, 0, 0);
    });

    source.addEventListener('audio_chunk', (event) => {
      const payload = JSON.parse(event.data);
      upsertAudioItem(payload);
    });

    source.addEventListener('chunk', (event) => {
      const payload = JSON.parse(event.data);

      addServerLog(`Chunk ${payload.chunk_index} received from backend.`);

      renderMergedText(payload);
      addRawChunk(payload);

      upsertAudioItem({
        chunk_index: payload.chunk_index,
        state: 'processed',
        audio_url: payload.audio_url,
        record_seconds: Number(payload.record_seconds || 0),
        queue_wait_seconds: Number(payload.queue_wait_seconds || 0),
        receive_seconds: Number(payload.receive_seconds || 0),
        process_seconds: Number(payload.process_seconds || 0),
        total_seconds: Number(payload.total_seconds || 0),
        audio_bytes: payload.audio_bytes,
        start_ts: payload.start_ts,
        end_ts: payload.end_ts,
        overlap_seconds: payload.overlap_seconds,
      });

      if (payload.revised_prev_applied) {
        addServerLog(`Chunk ${payload.chunk_index}: revised previous provisional tail.`);
      }
      if (payload.merge_fallback_used) {
        addServerLog(`Chunk ${payload.chunk_index}: used legacy merge fallback fields.`);
      }

      addServerLog(
        `Chunk ${payload.chunk_index}: ${payload.start_ts}s-${payload.end_ts}s, overlap ${payload.overlap_seconds || 0}s, record ${payload.record_seconds}s, queue ${payload.queue_wait_seconds || 0}s, receive ${payload.receive_seconds}s, process ${payload.process_seconds}s, total ${payload.total_seconds}s`
      );
    });

    fetch('/status')
      .then((response) => response.json())
      .then((payload) => setRecordingState(
        Boolean(payload.recording),
        Number(payload.queue_size || 0),
        Number(payload.overlap_ratio || 0),
        Number(payload.stride_seconds || 0)
      ))
      .catch(() => setRecordingState(false, 0, 0, 0));
  </script>
</body>
</html>
